<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026학년도 도곡초 행운의 로또추첨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #31135e 50%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }   

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 1.5rem;
        }

        .machine-dome {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0.7) 80%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            margin: 0 auto;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9), inset -20px -20px 50px rgba(255,255,255,0.15), 0 20px 50px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .machine-hose {
            width: 90px;
            height: 160px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.3) 20%, rgba(255,255,255,0.05) 80%, rgba(255,255,255,0.2) 100%);
            border-left: 2px solid rgba(255,255,255,0.4);
            border-right: 2px solid rgba(255,255,255,0.4);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            margin: -10px auto 0 auto; 
            position: relative;
            overflow: hidden;
            z-index: 5;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.4);
        }

        .scramble-ball {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 0 3px 6px rgba(0,0,0,0.4);
        }

        .lotto-ball-big {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.6);
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.5);
            animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0);
        }

        .ball-in-hose {
            position: absolute;
            top: 0;
            left: 50%;
            margin-left: -35px;
            width: 70px;
            height: 70px;
            font-size: 1.75rem;
            animation: dropHose 1.2s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
            z-index: 6;
        }

        @keyframes dropHose {
            0% { transform: translateY(-80px) rotate(0deg); opacity: 0; }
            15% { transform: translateY(0px) rotate(45deg); opacity: 1; }
            80% { transform: translateY(110px) rotate(180deg); opacity: 1; }
            100% { transform: translateY(180px) rotate(240deg); opacity: 0; }
        }

        @keyframes popOut {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            70% { transform: scale(1.1) translateY(-5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .color-1 { background: radial-gradient(circle at 30% 30%, #fbbf24, #b45309); color: #fff; } 
        .color-2 { background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); } 
        .color-3 { background: radial-gradient(circle at 30% 30%, #f87171, #b91c1c); } 
        .color-4 { background: radial-gradient(circle at 30% 30%, #9ca3af, #374151); } 
        .color-5 { background: radial-gradient(circle at 30% 30%, #34d399, #047857); } 

        .mini-ball {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            margin: 0 2px;
            color: #fff;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .mini-ball.matched {
            box-shadow: 0 0 15px rgba(253, 224, 71, 1), inset -2px -2px 4px rgba(0,0,0,0.3);
            transform: scale(1.1);
        }

        .text-gold {
            background: linear-gradient(to right, #fef08a, #f59e0b, #fef08a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(245, 158, 11, 0.3);
        }

        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { 
                position: absolute; left: 0; top: 0; width: 100%; 
                background: white; color: black; padding: 20px;
            }
            .print-ticket {
                border: 2px dashed #4b5563; padding: 15px; margin: 10px;
                width: calc(33% - 25px); display: inline-block;
                text-align: center; border-radius: 8px; page-break-inside: avoid;
            }
            .print-ball {
                display: inline-block; width: 30px; height: 30px; line-height: 30px;
                border: 1px solid #000; border-radius: 50%; margin: 2px;
                font-weight: bold; background: #fff !important; color: #000 !important;
            }
        }
    </style>
</head>
<body>

    <!-- 음악 플레이어 태그 (화면엔 보이지 않음) -->
    <audio id="bgm-player" loop></audio>

    <div class="max-w-5xl mx-auto px-4 py-10 relative z-20">
        
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gold mb-4 leading-tight py-2 drop-shadow-2xl">
                2026학년도 도곡초 1학기 워크숍<br>행운의 로또추첨 이벤트
            </h1>
        </header>

        <!-- 1. 초기 시작 섹션 (이미지 업로드 및 메뉴) -->
        <section id="setup-section" class="glass-panel p-8 mb-8 text-center max-w-2xl mx-auto transition-all duration-500">
            
            <div class="mb-4 border-2 border-dashed border-white/30 rounded-xl p-6 bg-white/5 hover:bg-white/10 transition relative group cursor-pointer overflow-hidden">
                <input type="file" id="image-upload" accept="image/*" onchange="previewImage(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div id="upload-placeholder" class="text-gray-300 group-hover:text-white transition">
                    <svg class="mx-auto h-12 w-12 mb-3 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="font-semibold text-lg">이곳을 클릭하여 행사 배너 이미지 업로드</p>
                    <p class="text-sm opacity-60 mt-1">한 번 업로드하면 새로고침해도 유지됩니다!</p>
                </div>
                <img id="image-preview" src="#" alt="미리보기" class="hidden w-full max-h-72 object-contain mx-auto rounded-lg relative z-20 pointer-events-none drop-shadow-lg">
            </div>

            <!-- BGM 업로드 영역 추가 -->
            <div class="mb-8 text-left bg-white/5 p-4 rounded-xl border border-white/10">
                <label class="block text-gray-300 text-sm mb-2 font-semibold flex items-center">
                    🎵 배경음악 (BGM) 추가 (선택사항)
                </label>
                <input type="file" id="bgm-upload" accept="audio/*" onchange="loadBGM(event)" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 transition cursor-pointer">
                <p class="text-xs text-gray-400 mt-2">긴장감 넘치는 mp3 파일을 넣으면 추첨장에서 음악이 재생됩니다.</p>
            </div>
            
            <div class="flex flex-col gap-4">
                <button onclick="startEventAndAssign()" class="bg-gradient-to-r from-yellow-500 via-orange-500 to-yellow-500 hover:from-yellow-400 hover:via-orange-400 hover:to-yellow-400 text-black font-extrabold py-4 px-12 rounded-full text-xl shadow-[0_0_20px_rgba(245,158,11,0.5)] transform transition hover:scale-105 active:scale-95 w-full">
                    🎫 로또 이벤트 본방송 시작
                </button>
                <div class="flex justify-between gap-4 mt-2">
                    <button onclick="printTickets()" class="bg-white/20 hover:bg-white/30 text-white font-bold py-3 px-6 rounded-lg w-full transition">
                        🖨️ 오프라인 인쇄용 번호표 뽑기
                    </button>
                    <button onclick="resetEvent()" class="bg-red-500/50 hover:bg-red-500/80 text-white font-bold py-3 px-6 rounded-lg w-1/3 transition">
                        🔄 초기화
                    </button>
                </div>
                <p id="saved-status" class="text-sm text-green-300 hidden mt-2">✅ 현재 저장된 티켓 번호가 존재합니다. 그대로 진행됩니다.</p>
            </div>
        </section>

        <!-- 2. 참가자 번호 배정 확인 섹션 -->
        <section id="assign-section" class="hidden transition-all duration-700">
            <div class="glass-panel overflow-hidden mb-8">
                <div class="bg-black/30 p-4 text-center border-b border-white/10 relative">
                    <h2 class="text-2xl font-extrabold text-white tracking-widest drop-shadow-md">📋 참가자 로또 번호 배정 현황</h2>
                    <p class="text-gray-300 mt-1 text-sm">25명 전원에게 행운의 번호 배정이 완료되었습니다.</p>
                </div>
                <div class="p-5">
                    <div id="assign-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3">
                        <!-- 자바스크립트로 배정 현황 렌더링 -->
                    </div>
                </div>
            </div>
            <div class="text-center">
                <button onclick="goToDrawSection()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 text-white font-extrabold py-4 px-12 rounded-full text-2xl shadow-[0_0_20px_rgba(59,130,246,0.5)] transform transition hover:scale-105 active:scale-95">
                    로또 추첨장으로 이동 ➡️
                </button>
            </div>
        </section>

        <!-- 3. 기계 추첨 섹션 -->
        <section id="draw-section" class="hidden transition-all duration-700 relative">
            
            <!-- 음악 제어 버튼 (추첨장 우측 상단) -->
            <button id="bgm-toggle-btn" onclick="toggleBGM()" class="hidden absolute -top-4 right-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-full backdrop-blur-sm text-sm font-bold transition z-50">
                🔊 BGM 켜짐
            </button>

            <div class="glass-panel text-center p-8 mb-8 max-w-3xl mx-auto mt-8">
                <h2 id="winning-title" class="text-2xl md:text-3xl font-bold text-yellow-300 mb-8 animate-pulse drop-shadow-md">
                    당첨 번호를 뽑아주세요!
                </h2>
                
                <div class="relative mb-12 flex flex-col items-center">
                    <div class="machine-dome" id="machine-dome"></div>
                    <div class="w-56 h-8 bg-gradient-to-b from-gray-600 to-gray-900 rounded-b-2xl border-t border-gray-500 shadow-2xl relative z-10 -mt-2 flex justify-center">
                        <div class="w-24 h-4 bg-black rounded-b-lg mt-4 opacity-50"></div> 
                    </div>
                    <div class="machine-hose" id="machine-hose"></div>
                    <div class="w-28 h-4 bg-gray-800 rounded-full mt-1 shadow-lg z-0 relative"></div>
                </div>
                
                <div class="min-h-[100px] mb-8 bg-black/20 rounded-2xl p-4 border border-white/10 shadow-inner">
                    <div id="winning-balls-container" class="flex justify-center gap-4 flex-wrap"></div>
                </div>

                <button id="draw-winning-btn" onclick="drawWinningNumber()" class="bg-gradient-to-r from-pink-500 to-red-600 hover:from-pink-400 hover:to-red-500 text-white font-extrabold py-4 px-12 rounded-full text-2xl shadow-[0_0_20px_rgba(239,68,68,0.5)] transform transition hover:scale-105 active:scale-95 mb-4">
                    돌려주세요! 🎯
                </button>

                <div id="next-action-container" class="hidden mt-6">
                    <button onclick="showResultSection()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-extrabold py-4 px-12 rounded-full text-2xl shadow-[0_0_20px_rgba(16,185,129,0.5)] transform transition hover:scale-110 animate-bounce">
                        🏆 참가자 최종 결과 확인하기
                    </button>
                </div>
            </div>
        </section>

        <!-- 4. 결과 현황판 섹션 -->
        <section id="result-section" class="hidden transition-all duration-1000 opacity-0">
            <div class="glass-panel overflow-hidden">
                <div class="bg-black/30 p-6 text-center border-b border-white/10">
                    <h2 class="text-3xl font-extrabold text-gold tracking-widest">🏆 25인 최종 당첨 결과 🏆</h2>
                </div>
                <div class="overflow-x-auto p-4">
                    <table class="w-full text-center border-collapse">
                        <thead>
                            <tr class="text-gray-300 font-semibold text-lg border-b border-white/20">
                                <th class="py-4 px-6">참가자 이름</th>
                                <th class="py-4 px-6">로또 번호</th>
                                <th class="py-4 px-6 w-32">일치 개수</th>
                                <th class="py-4 px-6 w-32">최종 등수</th>
                            </tr>
                        </thead>
                        <tbody id="result-tbody" class="divide-y divide-white/10 text-lg"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- 5. 커스텀 모달 (초기화 경고 및 인쇄 미리보기용) -->
    <div id="custom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 transition-opacity">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8 text-gray-800 relative">
        </div>
    </div>

    <!-- 6. 인쇄 전용 영역 -->
    <div id="print-section" class="hidden"></div>

    <script>
        const TOTAL_PARTICIPANTS = 25;
        let currentWinningNumbers = []; 
        let currentWinningNumberIndex = 0;
        let globalFinalResults = [];
        let scrambleInterval = null;
        let isDrawing = false;

        window.onload = () => {
            const savedImg = localStorage.getItem('lotto_bg_image');
            if (savedImg) {
                const img = document.getElementById('image-preview');
                img.src = savedImg;
                img.classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
            if(localStorage.getItem('lotto_state')) {
                document.getElementById('saved-status').classList.remove('hidden');
            }
        };

        // 이미지 로드
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('image-preview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    try { localStorage.setItem('lotto_bg_image', e.target.result); } 
                    catch(err) { console.warn("이미지 용량이 너무 큽니다."); }
                }
                reader.readAsDataURL(file);
            }
        }

        // BGM 로드 (브라우저 정책상 파일 용량이 클 수 있어 localStorage 저장은 생략)
        function loadBGM(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('bgm-player').src = url;
            }
        }

        // BGM 켜기/끄기 토글
        function toggleBGM() {
            const bgm = document.getElementById('bgm-player');
            const btn = document.getElementById('bgm-toggle-btn');
            if(bgm.paused) {
                bgm.play();
                btn.innerHTML = '🔊 BGM 켜짐';
                btn.classList.replace('text-gray-400', 'text-white');
            } else {
                bgm.pause();
                btn.innerHTML = '🔇 BGM 꺼짐';
                btn.classList.replace('text-white', 'text-gray-400');
            }
        }

        // --- 알고리즘 ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function getColorClass(num) {
            if (num <= 10) return 'color-1'; 
            if (num <= 20) return 'color-2'; 
            if (num <= 30) return 'color-3'; 
            if (num <= 40) return 'color-4'; 
            return 'color-5';                
        }

        function generateWinningNumbers() {
            const pool = Array.from({length: 45}, (_, i) => i + 1);
            return shuffle(pool).slice(0, 5).sort((a, b) => a - b);
        }

        function generateLottoNumbers(matchCount) {
            const matchedNums = shuffle([...currentWinningNumbers]).slice(0, matchCount);
            const pool = Array.from({length: 45}, (_, i) => i + 1);
            const nonWinningPool = pool.filter(n => !currentWinningNumbers.includes(n));
            const nonMatchedNums = shuffle(nonWinningPool).slice(0, 5 - matchCount);
            return [...matchedNums, ...nonMatchedNums].sort((a, b) => a - b);
        }

        function generateRiggedResults() {
            let tickets = [];
            for(let i=0; i<3; i++) tickets.push({ nums: generateLottoNumbers(5), matches: 5, rank: 1 });
            for(let i=0; i<4; i++) tickets.push({ nums: generateLottoNumbers(4), matches: 4, rank: 2 });
            for(let i=0; i<5; i++) tickets.push({ nums: generateLottoNumbers(3), matches: 3, rank: 3 });
            for(let i=0; i<6; i++) tickets.push({ nums: generateLottoNumbers(2), matches: 2, rank: 4 });
            for(let i=0; i<7; i++) tickets.push({ nums: generateLottoNumbers(1), matches: 1, rank: 5 });
            return shuffle(tickets); 
        }

        function ensureStateExists() {
            const savedState = localStorage.getItem('lotto_state');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                currentWinningNumbers = parsed.winningNumbers;
                globalFinalResults = parsed.results;
            } else {
                const names = Array.from({length: TOTAL_PARTICIPANTS}, (_, i) => `참가자 ${i + 1}`);
                currentWinningNumbers = generateWinningNumbers();
                const riggedTickets = generateRiggedResults();
                globalFinalResults = names.map((name, index) => ({
                    name: name,
                    ...riggedTickets[index]
                }));
                localStorage.setItem('lotto_state', JSON.stringify({
                    winningNumbers: currentWinningNumbers,
                    results: globalFinalResults
                }));
                document.getElementById('saved-status').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        function resetEvent() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="text-center">
                    <div class="text-6xl mb-4">⚠️</div>
                    <h3 class="text-3xl font-extrabold text-red-600 mb-4">초기화 경고</h3>
                    <p class="text-lg text-gray-600 mb-8">저장된 행사 이미지와 발급된 번호를 모두 삭제하시겠습니까?</p>
                    <div class="flex justify-center gap-4">
                        <button onclick="closeModal()" class="px-8 py-4 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold text-lg transition">취소하기</button>
                        <button onclick="executeReset()" class="px-8 py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-lg transition shadow-lg">확인 (초기화)</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function executeReset() {
            localStorage.removeItem('lotto_state');
            localStorage.removeItem('lotto_bg_image');
            window.location.reload();
        }

        function printTickets() {
            ensureStateExists();
            
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            
            let html = '<h2 class="text-3xl font-extrabold text-center mb-2">🖨️ 오프라인 인쇄용 티켓 미리보기</h2>';
            html += '<p class="text-center text-red-500 font-semibold mb-6">※ 인쇄는 코드를 파일로 저장 후 크롬에서 실행해 주세요.</p>';
            
            html += '<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8 bg-gray-100 p-6 rounded-xl max-h-[50vh] overflow-y-auto">';
            globalFinalResults.forEach(res => {
                const numsHtml = res.nums.map(n => `<span class="inline-block w-8 h-8 leading-8 text-center bg-white border border-gray-400 rounded-full mx-1 font-bold text-sm shadow-sm">${n}</span>`).join('');
                html += `
                    <div class="border-2 border-dashed border-gray-400 p-4 text-center rounded-lg bg-white shadow-sm">
                        <strong class="text-lg block mb-3 text-indigo-800">${res.name}</strong>
                        <div class="mb-2">${numsHtml}</div>
                        <div class="text-xs text-gray-500 mt-2 font-medium">2026 도곡초 1학기 워크숍</div>
                    </div>`;
            });
            html += '</div>';

            html += `
                <div class="flex justify-center gap-4 border-t border-gray-200 pt-6">
                    <button onclick="closeModal()" class="px-8 py-4 bg-gray-500 hover:bg-gray-600 text-white rounded-xl font-bold text-lg transition">닫기</button>
                    <button onclick="executePrint()" class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg transition shadow-lg">브라우저 인쇄 실행</button>
                </div>
            `;
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
        }

        function executePrint() {
            const printSec = document.getElementById('print-section');
            let html = '<h2 style="text-align:center; font-size: 24px; margin-bottom: 30px;">도곡초 행운의 로또 번호표 (오프라인 배부용)</h2>';
            html += '<div>';
            globalFinalResults.forEach(res => {
                const numsHtml = res.nums.map(n => `<span class="print-ball">${n}</span>`).join('');
                html += `
                    <div class="print-ticket">
                        <strong style="font-size: 18px; display:block; margin-bottom: 10px;">${res.name}</strong>
                        <div>${numsHtml}</div>
                        <div style="font-size: 12px; margin-top: 10px; color: #666;">2026 도곡초 1학기 워크숍</div>
                    </div>`;
            });
            html += '</div>';
            
            printSec.innerHTML = html;
            window.print();
        }

        // --- 화면 흐름 제어 ---
        function startEventAndAssign() {
            ensureStateExists(); 
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('assign-section').classList.remove('hidden');
            renderAssignTable(globalFinalResults);
        }

        function renderAssignTable(results) {
            const grid = document.getElementById('assign-grid');
            grid.innerHTML = '';
            results.forEach((res, idx) => {
                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-3 rounded-xl transition-colors duration-300 border border-white/10 hover:bg-white/10 ${idx % 2 === 0 ? 'bg-white/5' : 'bg-black/20'}`;
                const numsHtml = res.nums.map(n => `<span class="mini-ball ${getColorClass(n)}">${n}</span>`).join('');
                item.innerHTML = `
                    <span class="font-bold text-white text-lg pl-2">${res.name}</span>
                    <div class="flex space-x-1">${numsHtml}</div>
                `;
                grid.appendChild(item);
            });
        }

        function goToDrawSection() {
            document.getElementById('assign-section').style.display = 'none';
            document.getElementById('draw-section').classList.remove('hidden');
            initMachine();

            // 음악 재생 로직
            const bgm = document.getElementById('bgm-player');
            if (bgm.src) {
                document.getElementById('bgm-toggle-btn').classList.remove('hidden');
                bgm.play().catch(e => console.log("사용자 상호작용 부족으로 자동재생이 차단될 수 있습니다."));
            }
        }

        function initMachine() {
            const dome = document.getElementById('machine-dome');
            dome.innerHTML = '';
            for (let i = 1; i <= 45; i++) {
                const ball = document.createElement('div');
                ball.className = `scramble-ball ${getColorClass(i)}`;
                ball.textContent = i;
                ball.style.left = `${Math.random() * 80 + 10}%`;
                ball.style.top = `${Math.random() * 80 + 10}%`;
                dome.appendChild(ball);
            }
            scrambleInterval = setInterval(scrambleBalls, 600);
            scrambleBalls(); 
        }

        function scrambleBalls() {
            const balls = document.querySelectorAll('.scramble-ball');
            balls.forEach(ball => {
                const x = Math.random() * 80 + 10;
                const y = Math.random() * 80 + 10;
                ball.style.left = `${x}%`;
                ball.style.top = `${y}%`;
            });
        }

        async function drawWinningNumber() {
            if (isDrawing || currentWinningNumberIndex >= 5) return;
            isDrawing = true;
            
            const btn = document.getElementById('draw-winning-btn');
            btn.innerHTML = '호스에서 번호가 내려옵니다... 🌪️';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            clearInterval(scrambleInterval);
            scrambleInterval = setInterval(scrambleBalls, 200); 
            
            await new Promise(resolve => setTimeout(resolve, 800)); 
            
            clearInterval(scrambleInterval);
            scrambleInterval = setInterval(scrambleBalls, 600);

            const drawnNum = currentWinningNumbers[currentWinningNumberIndex];
            
            const hose = document.getElementById('machine-hose');
            const dropBall = document.createElement('div');
            dropBall.className = `lotto-ball-big ball-in-hose ${getColorClass(drawnNum)}`;
            dropBall.textContent = drawnNum;
            hose.appendChild(dropBall);

            await new Promise(resolve => setTimeout(resolve, 1200));
            dropBall.remove(); 

            const ballsContainer = document.getElementById('winning-balls-container');
            const bigBall = document.createElement('div');
            bigBall.className = `lotto-ball-big ${getColorClass(drawnNum)}`;
            bigBall.textContent = drawnNum;
            ballsContainer.appendChild(bigBall);

            currentWinningNumberIndex++;
            isDrawing = false;

            if (currentWinningNumberIndex >= 5) {
                btn.style.display = 'none';
                document.getElementById('winning-title').textContent = "🎉 5개의 당첨 번호가 모두 나왔습니다! 🎉";
                document.getElementById('winning-title').classList.replace('text-yellow-300', 'text-green-400');
                
                clearInterval(scrambleInterval);

                setTimeout(() => {
                    document.getElementById('next-action-container').classList.remove('hidden');
                }, 1000);
            } else {
                btn.innerHTML = '다음 번호 돌려주세요! 🎯';
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function showResultSection() {
            document.getElementById('draw-section').style.display = 'none';
            renderFinalTable(globalFinalResults);
            
            const resultSection = document.getElementById('result-section');
            resultSection.classList.remove('hidden');
            setTimeout(() => {
                resultSection.classList.remove('opacity-0');
            }, 100);

            // 결과 화면 나올 때 음악 정지 (선택 사항)
            const bgm = document.getElementById('bgm-player');
            const btn = document.getElementById('bgm-toggle-btn');
            if (!bgm.paused) {
                bgm.pause();
                btn.innerHTML = '🔇 BGM 꺼짐';
                btn.classList.replace('text-white', 'text-gray-400');
            }
        }

        function renderFinalTable(results) {
            const tbody = document.getElementById('result-tbody');
            tbody.innerHTML = '';

            const rankColors = {
                1: 'text-yellow-300 font-extrabold text-2xl drop-shadow-[0_0_10px_rgba(253,224,71,0.8)]',
                2: 'text-gray-200 font-bold text-xl drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]',
                3: 'text-orange-300 font-semibold',
                4: 'text-blue-300 font-medium',
                5: 'text-green-300'
            };

            results.forEach((res, idx) => {
                const tr = document.createElement('tr');
                tr.className = `transition-colors duration-300 ${res.rank === 1 ? 'bg-yellow-900/40' : (idx % 2 === 0 ? 'bg-white/5' : 'bg-transparent')}`;

                const numsHtml = res.nums.map(n => {
                    const isMatch = currentWinningNumbers.includes(n);
                    return `<span class="mini-ball ${getColorClass(n)} ${isMatch ? 'matched' : 'opacity-40'}">${n}</span>`;
                }).join('');

                tr.innerHTML = `
                    <td class="py-4 px-6 font-bold text-white">${res.name}</td>
                    <td class="py-4 px-6">${numsHtml}</td>
                    <td class="py-4 px-6 font-bold text-blue-300">${res.matches}개</td>
                    <td class="py-4 px-6">
                        <span class="${rankColors[res.rank]}">${res.rank === 1 ? '🎉 1등 🎉' : res.rank + '등'}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
